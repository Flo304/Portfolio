    <link rel="stylesheet" href="styles.css" />
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: visible;
        }

        .layout {
            margin-top: 0px;
            width: 100%;
        }

        .row {
            display: flex;
            width: 100%;
            margin-bottom: 0px; /* unchanged */
        }

        /* =========================
           KEEP YOUR ORIGINAL RULES
        ========================== */

        .row-two img {
            width: 40%;
            height: auto;
            object-fit: cover;
        }

        .row-center {
            justify-content: center;
        }

        .row-center img {
            width: 60%;
            height: auto;
        }

        .row-left img {
            width: 50%;
            height: auto;
        }

        .row-right {
            justify-content: flex-end;
        }

        .row-right img {
            width: 60%;
        }

        .row-two img:first-child {
            width: 60%;
        }

        .row-two img:last-child {
            width: 40%;
        }

        /* =========================
           NEW: OPTIONAL RULE SYSTEM
           (does NOT override yours)
        ========================== */

        .row-single {} /* semantic only */
        .row-three {
            flex-wrap: wrap;
        }

        /* =========================
           DECALAGE (clean version)
        ========================== */

        .offset-down {
            transform: translateY(15%);
        }

        .offset-up {
            transform: translateY(-15%);
        }

        .offset-right {
            transform: translateX(15%);
        }

        .offset-left {
            transform: translateX(-15%);
        }

        /* =========================
           NAVBAR (UNCHANGED)
        ========================== */

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            height: 100vh;
            background: transparent;
            z-index: 9999;
        }

        .sidebar p,
        .sidebar nav {
            background: transparent;
            display: inline-block;
        }

        body {
            margin: 0;
            padding: 0;
        }

        .copyright {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            color: rgb(0, 0, 0);
            text-align: center;
            padding: 8px 0;
            font-size: 10px;
            z-index: 1000;
        }
    </style>
</head>
