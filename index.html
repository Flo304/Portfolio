<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: visible;
        }

        /* =========================
           FIX: FULL WIDTH LAYOUT
        ========================== */
        .layout {
            margin-top: 0px; /* KEEP YOUR ORIGINAL */
            width: 100%;
        }

        .row {
            display: flex;
            width: 100%;
            margin-bottom: 0px;
        }

        /* KEEP ALL YOUR ORIGINAL IMAGE RULES */
        .row-two img {
            width: 40%;
            height: auto;
            object-fit: cover;
        }

        .row-center {
            justify-content: center;
        }

        .row-center img {
            width: 60%;
            height: auto;
        }

        .row-left img {
            width: 50%;
            height: auto;
        }

        .row-right {
            justify-content: flex-end;
        }

        .row-right img {
            width: 60%;
        }

        /* your split rule (unchanged behaviour) */
        .row-two img:first-child {
            width: 60%;
        }

        .row-two img:last-child {
            width: 40%;
        }

        /* =========================
           🔥 NAVBAR OVERLAY FIX
        ========================== */

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px; /* keep your design */
            height: 100vh;

            /* IMPORTANT: remove white blocking box */
            background: transparent;

            z-index: 9999; /* always above images */
        }

        /* optional: if your text needs readability */
        .sidebar p,
        .sidebar nav {
            background: transparent;
            display: inline-block;
        }

        /* =========================
           REMOVE LAYOUT SHIFT
        ========================== */
        body {
            margin: 0;
            padding: 0;
        }

        /* Copyright banner fixed at bottom */
        .copyright {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            color: rgb(0, 0, 0);
            text-align: center;
            padding: 8px 0;
            font-size: 10px;
            z-index: 1000;
        }
    </style>
</head>
