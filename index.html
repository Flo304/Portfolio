<!DOCTYPE html>
<html lang="en">

<head>

    <title>Home - Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="styles.css" />

    <style>

        /* =========================
           GLOBAL
        ========================== */

        html,
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Roboto', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
            flex-shrink: 0;
        }

        /* =========================
           LAYOUT
        ========================== */

        .layout {
            width: 100%;
            margin-top: 0;
        }

        .row {
            display: flex;
            width: 100%;
            margin-bottom: 0;
        }

        .row-right {
            justify-content: flex-end;
        }

        .row-center {
            justify-content: center;
        }

        /* =========================
           WIDTH UTILITIES
        ========================== */

        .w-30 {
            width: 30%;
        }

        .w-40 {
            width: 40%;
        }

        .w-45 {
            width: 45%;
        }

        .w-50 {
            width: 50%;
        }

        .w-60 {
            width: 60%;
        }

        /* =========================
           OPTIONAL SPACING
        ========================== */

        .mt-50 {
            margin-top: 50px;
        }

        .mt-100 {
            margin-top: 100px;
        }

        .ml-50 {
            margin-left: 50px;
        }

        .ml-100 {
            margin-left: 100px;
        }

        /* =========================
           SIDEBAR
        ========================== */

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            height: 100vh;
            background: transparent;
            z-index: 9999;
        }

        .sidebar p,
        .sidebar nav {
            background: transparent;
            display: inline-block;
        }

        /* =========================
           FOOTER
        ========================== */

        .copyright {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            color: rgb(0, 0, 0);
            text-align: center;
            padding: 8px 0;
            font-size: 10px;
            z-index: 1000;
        }

    </style>
</head>
